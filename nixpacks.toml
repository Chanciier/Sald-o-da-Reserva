[phases.setup]
# dejavu_fonts + fontconfig: o `sharp` (via librsvg) precisa de uma fonte de
# verdade instalada no container pra rasterizar <text> do SVG — sem isso, todo
# texto (etiqueta de retirada, etc.) sai como caixinha (glifo ausente),
# incluindo acentos do português. DejaVu cobre bem Latin + acentuação.
nixPkgs = ["nodejs_20", "dejavu_fonts", "fontconfig"]

[phases.install]
cmds = []

[phases.build]
cmds = ["npm install --include=dev && cd apps/api && npx prisma generate && npx nest build"]
