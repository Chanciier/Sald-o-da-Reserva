[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && cd apps/api && npx prisma generate && npx nest build"

[deploy]
startCommand = "sh -c 'find /app -name main.js 2>/dev/null | head -10; node apps/api/dist/main'"
preDeployCommand = "npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma"
